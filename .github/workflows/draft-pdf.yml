name: Paper Draft

permissions:
  contents: write

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build from'
        required: false
        default: 'main'
        type: string
  
  # Trigger on push to main, but only if paper/figures changed
  push:
    branches:
      - main
    paths:
      - 'paper/**'
      - 'figures/**'
      - '.github/workflows/draft-pdf.yml'
  
  # Trigger on PR, but only if paper/figures changed
  pull_request:
    branches:
      - main
    paths:
      - 'paper/**'
      - 'figures/**'
      - '.github/workflows/draft-pdf.yml'

jobs:
  draft-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      
      - name: Build Draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-draft-${{ github.sha }}
          path: paper/paper.pdf

      - name: Commit updated PDF to repository
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.ref }}" ]]; then
            target_branch="${{ inputs.ref }}"
          else
            target_branch="${{ github.ref_name }}"
          fi

          if ! git ls-remote --exit-code --heads origin "$target_branch" >/dev/null 2>&1; then
            echo "The selected ref '$target_branch' is not a remote branch."
            echo "Use a branch name for workflow_dispatch if you want the workflow to push updates."
            exit 1
          fi

          git checkout -B "$target_branch" "origin/$target_branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add paper/paper.pdf

          if git diff --cached --quiet; then
            echo "No PDF change detected; nothing to commit."
            exit 0
          fi

          git commit -m "Update draft PDF [skip ci]"
          git pull --rebase origin "$target_branch"
          git push origin HEAD:"$target_branch"